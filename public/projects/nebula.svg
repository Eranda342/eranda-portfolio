    <rect x="60" y="140" width="1160" height="400" rx="16" fill="#0A1029" stroke="#1e293b" />
    <path d="M 160 400 L 400 200 L 650 300 L 900 150 L 1160 250" fill="none" stroke="#38BDF8" stroke-width="4" opacity="0.5" />
    <path d="M 160 450 L 400 280 L 650 380 L 900 200 L 1160 300" fill="none" stroke="#22D3EE" stroke-width="8" />
