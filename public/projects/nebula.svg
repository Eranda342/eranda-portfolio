    <rect x="60" y="60" width="300" height="30" rx="4" fill="#38BDF8" opacity="0.3" />
    <rect x="60" y="140" width="480" height="400" rx="16" fill="#0A1029" stroke="#1e293b" />
    <circle cx="300" cy="340" r="120" fill="none" stroke="#00E5FF" stroke-width="16" opacity="0.8" />
    <circle cx="300" cy="340" r="120" fill="none" stroke="#38BDF8" stroke-width="16" stroke-dasharray="200 600" />
    <rect x="60" y="600" width="480" height="20" rx="4" fill="#475569" opacity="0.2" />
    <rect x="60" y="640" width="480" height="20" rx="4" fill="#475569" opacity="0.2" />
  </g>

  <g transform="translate(760, 640)">
    <rect x="0" y="0" width="600" height="360" rx="24" fill="url(#card)" stroke="#1e293b" stroke-width="2" />
    <rect x="60" y="60" width="200" height="30" rx="4" fill="#22D3EE" opacity="0.3" />
    <path d="M 60 260 L 200 140 L 350 200 L 540 100" fill="none" stroke="#00E5FF" stroke-width="6" />
    <circle cx="200" cy="140" r="8" fill="#00E5FF" />
    <circle cx="350" cy="200" r="8" fill="#00E5FF" />
    <circle cx="540" cy="100" r="8" fill="#00E5FF" />
  </g>

  <g transform="translate(760, 1080)">
    <rect x="0" y="0" width="600" height="360" rx="24" fill="url(#card)" stroke="#1e293b" stroke-width="2" />
    <rect x="60" y="60" width="480" height="20" rx="4" fill="#475569" opacity="0.2" />
    <rect x="60" y="100" width="480" height="20" rx="4" fill="#475569" opacity="0.2" />
    <rect x="60" y="140" width="300" height="20" rx="4" fill="#475569" opacity="0.2" />
    <rect x="60" y="220" width="480" height="80" rx="8" fill="#0A1029" stroke="#1e293b" />
