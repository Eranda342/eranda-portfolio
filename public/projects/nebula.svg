<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="3000" viewBox="0 0 1440 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#02040a" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01" />
    </linearGradient>
  </defs>
  <rect width="1440" height="3000" fill="url(#bg)" />
  
  <!-- Header -->
  <rect x="0" y="0" width="1440" height="80" fill="#0A1029" opacity="0.8" />
  <circle cx="60" cy="40" r="16" fill="#00E5FF" />
  <rect x="100" y="30" width="200" height="20" rx="4" fill="#1e293b" />
  <rect x="1180" y="30" width="200" height="20" rx="4" fill="#1e293b" />

  <!-- Hero Section -->
  <rect x="80" y="160" width="1280" height="400" rx="24" fill="url(#card)" stroke="#1e293b" stroke-width="2" />
  <rect x="140" y="240" width="600" height="40" rx="8" fill="#00E5FF" opacity="0.2" />
  <rect x="140" y="300" width="800" height="20" rx="4" fill="#475569" opacity="0.4" />
  <rect x="140" y="340" width="700" height="20" rx="4" fill="#475569" opacity="0.4" />
  <rect x="140" y="420" width="180" height="60" rx="30" fill="#00E5FF" />

  <!-- Content Blocks -->
  <g transform="translate(80, 640)">
